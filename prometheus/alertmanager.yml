# ============================================================
# Alertmanager Configuration
# Author: Vatsalya Patel | github.com/lnvpatel
#
# Routes alerts to appropriate receivers based on severity.
# Default receiver: console log (no external service needed)
#
# To enable email or Slack:
#   1. Uncomment the relevant receiver below
#   2. Fill in your credentials
#   3. Restart alertmanager: docker compose restart alertmanager
# ============================================================

global:
  # How long to wait before re-sending a resolved alert
  resolve_timeout: 5m

  # ── SMTP Email Settings (uncomment to enable) ──────────────
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alerts@yourdomain.com'
  # smtp_auth_username: 'youremail@gmail.com'
  # smtp_auth_password: 'your-app-password'   # Use Gmail App Password
  # smtp_require_tls: true

# ── Routing Tree ──────────────────────────────────────────────
route:
  # Default receiver for all alerts
  receiver: 'console-log'

  # Group alerts by alertname + instance so similar alerts batch
  group_by: ['alertname', 'instance', 'severity']

  # Wait this long before sending first alert notification
  group_wait: 30s

  # Wait this long before sending a new group of alerts
  group_interval: 5m

  # Resend alert if still firing after this duration
  repeat_interval: 4h

  # ── Sub-routes: route by severity ─────────────────────────
  routes:
    # Critical alerts – send immediately
    - match:
        severity: critical
      receiver: 'console-log'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts – standard routing
    - match:
        severity: warning
      receiver: 'console-log'
      repeat_interval: 4h

# ── Inhibition Rules ──────────────────────────────────────────
# Suppress warning if critical is already firing for same instance
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# ── Receivers ─────────────────────────────────────────────────
receivers:

  # Default: log to console (always works, no config needed)
  - name: 'console-log'
    # No external integrations – alerts visible in Alertmanager UI
    # Access: http://localhost:9093

  # ── Email Receiver (uncomment + configure to enable) ────────
