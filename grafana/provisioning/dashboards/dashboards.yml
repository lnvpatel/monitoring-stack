# ============================================================
# Grafana Dashboard Provisioning
# Loads dashboards from /var/lib/grafana/dashboards at startup
# Author: Vatsalya Patel | github.com/lnvpatel
# ============================================================

apiVersion: 1

providers:
  - name: 'monitoring-stack-dashboards'
    orgId: 1
    folder: 'Monitoring Stack'
    folderUid: 'monitoring-stack'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
